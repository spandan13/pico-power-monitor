# power_monitor config.ini
# ──────────────────────────────────────────────────────────────────────────────
# Copy this file to config.ini and fill in your values before running
# power_monitor.py
# ──────────────────────────────────────────────────────────────────────────────

[pico]
# IP address printed to the Pico's serial console on boot (no trailing slash)
url       = http://192.168.1.42
device_id = pico_01

[telegram]
# Leave as-is if you don't want Telegram alerts — the script will skip them
token   = YOUR_BOT_TOKEN
chat_id = YOUR_CHAT_ID

[monitor]
log_file        = power_log.txt  
# path to append outage log entries
poll_interval   = 5              
# seconds between HTTP polls to the Pico
offline_timeout = 15             
# NOT USED in HTTP mode (kept for compat)
http_timeout    = 4              
# seconds before an HTTP request is considered failed

[web]
host = 0.0.0.0   
# bind address for the Flask dashboard
port = 8080      
# port for the Flask dashboard